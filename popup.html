<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Reminder Assistant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 420px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
    }

    .container {
      background: white;
      border-radius: 8px;
      margin: 12px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #f0f0f0;
    }

    .header h1 {
      font-size: 20px;
      color: #667eea;
      font-weight: 600;
    }

    .header-buttons {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 20px;
      color: #666;
      transition: all 0.3s;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      position: relative;
    }

    .icon-btn:hover {
      background: #f5f5f5;
      color: #667eea;
    }

    .icon-btn.download-btn:hover {
      background: #e3f2fd;
      color: #1976d2;
    }

    .close-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 24px;
      color: #666;
      transition: all 0.3s;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    .close-btn:hover {
      background: #ffebee;
      color: #c62828;
    }

    .gear-btn:hover {
      transform: rotate(90deg);
    }

    .tooltip {
      visibility: hidden;
      background-color: #333;
      color: #fff;
      text-align: center;
      padding: 6px 10px;
      border-radius: 6px;
      position: absolute;
      z-index: 1000;
      bottom: 120%;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      font-size: 11px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .tooltip::after {
      content: "";
      position: absolute;
      top: 100%;
      left: 50%;
      margin-left: -5px;
      border-width: 5px;
      border-style: solid;
      border-color: #333 transparent transparent transparent;
    }

    .icon-btn:hover .tooltip {
      visibility: visible;
      opacity: 1;
    }

    .setup-form {
      display: none;
    }

    .setup-form.active {
      display: block;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-size: 13px;
      font-weight: 500;
      color: #555;
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
      background: white;
    }

    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: #667eea;
    }

    .form-group input::placeholder {
      color: #999;
    }

    .form-group select:disabled {
      background: #f5f5f5;
      cursor: not-allowed;
    }

    .optional {
      color: #999;
      font-size: 11px;
      font-weight: normal;
    }

    .toggle-group {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      margin-bottom: 15px;
    }

    .toggle-group label {
      font-size: 13px;
      font-weight: 500;
      color: #555;
      margin-bottom: 0;
    }

    .toggle-switch {
      position: relative;
      width: 50px;
      height: 26px;
      background-color: #ccc;
      border-radius: 13px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    .toggle-switch.active {
      background-color: #667eea;
    }

    .toggle-slider {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      background-color: white;
      border-radius: 50%;
      transition: transform 0.3s;
    }

    .toggle-switch.active .toggle-slider {
      transform: translateX(24px);
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .btn-primary {
      background: #667eea;
      color: white;
    }

    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(102, 126, 234, 0.3);
    }

    .btn-send {
      background: #667eea;
      color: white;
      font-size: 16px;
      padding: 14px;
      margin-top: 20px;
    }

    .btn-send:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(102, 126, 234, 0.3);
    }

    .main-view {
      display: none;
    }

    .main-view.active {
      display: block;
    }

    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      background: #e8f5e9;
      color: #2e7d32;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 15px;
    }

    .reminder-section {
      margin-top: 20px;
    }

    .reminder-section h3 {
      font-size: 16px;
      color: #667eea;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .custom-body-section {
      margin-top: 15px;
      padding: 15px;
      background: #f9f9f9;
      border-radius: 6px;
      border: 2px dashed #e0e0e0;
      display: none;
    }

    .custom-body-section.active {
      display: block;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .custom-body-section h4 {
      font-size: 13px;
      color: #667eea;
      margin-bottom: 10px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .ai-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all 0.3s;
      box-shadow: 0 2px 4px rgba(102, 126, 234, 0.3);
    }

    .ai-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(102, 126, 234, 0.4);
    }

    .custom-body-section textarea {
      width: 100%;
      min-height: 100px;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
      transition: border-color 0.3s;
    }

    .custom-body-section textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .custom-body-section .hint {
      font-size: 11px;
      color: #999;
      margin-top: 5px;
    }

    .info-text {
      font-size: 12px;
      color: #666;
      text-align: center;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #f0f0f0;
    }

    .loading {
      display: none;
      text-align: center;
      padding: 20px;
      color: #667eea;
    }

    .loading.active {
      display: block;
    }

    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .success-msg {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
      margin-bottom: 15px;
      font-size: 13px;
      display: none;
    }

    .success-msg.active {
      display: block;
    }

    /* AI Prompt Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 8px;
      padding: 24px;
      width: 90%;
      max-width: 360px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
      animation: modalSlideIn 0.3s ease;
    }

    @keyframes modalSlideIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .modal-header h3 {
      font-size: 18px;
      color: #667eea;
      font-weight: 600;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      color: #666;
      cursor: pointer;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all 0.3s;
    }

    .modal-close:hover {
      background: #ffebee;
      color: #c62828;
    }

    .modal-body textarea {
      width: 100%;
      min-height: 120px;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      transition: border-color 0.3s;
    }

    .modal-body textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .modal-footer {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .modal-footer button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn-cancel {
      background: #f5f5f5;
      color: #666;
    }

    .btn-cancel:hover {
      background: #e0e0e0;
    }

    .btn-generate {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-generate:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(102, 126, 234, 0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Automate Reminders</h1>
      <div class="header-buttons">
        <button class="icon-btn download-btn" id="downloadBtn">
          📥
          <span class="tooltip">Please make sure your CSV looks like the sample CSV</span>
        </button>
        <button class="icon-btn gear-btn" id="settingsBtn">
          ⚙️
          <span class="tooltip">Change config</span>
        </button>
        <button class="close-btn" id="closeBtn">✕</button>
      </div>
    </div>

    <div class="success-msg" id="successMsg"></div>

    <!-- Setup Form -->
    <div class="setup-form active" id="setupForm">
      <h2 style="font-size: 16px; margin-bottom: 15px; color: #333;">Initial Setup</h2>
      <form id="configForm">
        <div class="form-group">
          <label for="userName">Your Name</label>
          <input type="text" id="userName" placeholder="e.g., Rajesh Kumar" required>
        </div>
        
        <div class="form-group">
          <label for="userEmail">Your Email</label>
          <input type="email" id="userEmail" placeholder="e.g., rajesh@business.com" required>
        </div>
        
        <div class="form-group">
          <label for="businessPhone">Business Phone Number <span class="optional">(Optional)</span></label>
          <input type="tel" id="businessPhone" placeholder="e.g., +91 98765 43210">
        </div>
        
        <div class="form-group">
          <label for="sheetLink">Google Sheets Link</label>
          <input type="url" id="sheetLink" placeholder="https://docs.google.com/spreadsheets/d/..." required>
        </div>

        <div class="toggle-group">
          <label>Enable Automation</label>
          <div class="toggle-switch" id="automationToggle">
            <div class="toggle-slider"></div>
          </div>
        </div>
        
        <button type="submit" class="btn btn-primary">Save Configuration</button>
      </form>
    </div>

    <!-- Main View -->
    <div class="main-view" id="mainView">
      <div class="status-badge">✓ Configured</div>
      
      <div class="reminder-section">
        <h3>📧 Send Reminder</h3>
        
        <div class="form-group">
          <label for="reminderTo">To</label>
          <select id="reminderTo">
            <option value="pending">Pending</option>
            <option value="partial">Partial</option>
            <option value="paid">Paid</option>
            <option value="all">All</option>
          </select>
        </div>

        <div class="form-group">
          <label for="reminderType">Type</label>
          <select id="reminderType">
            <option value="email">Email</option>
            <option value="whatsapp">WhatsApp</option>
            <option value="both">Both</option>
          </select>
        </div>

        <div class="toggle-group" id="customBodyToggleGroup" style="display: none;">
          <label>Custom Body</label>
          <div class="toggle-switch" id="customBodyToggle">
            <div class="toggle-slider"></div>
          </div>
        </div>

        <!-- Custom Body Editor -->
        <div class="custom-body-section" id="customBodySection">
          <h4>
            ✏️ Custom Message Body
            <button class="ai-btn" id="aiBtn" title="Write me a prompt">
              🤖 AI Write
            </button>
          </h4>
          <textarea id="customBodyText" placeholder="Write your custom message here...

Example:
Dear [Name],
This is a reminder that your payment of ₹[Amount] is due on [Date].
Please complete the payment at your earliest convenience.

Thanks,
[Your Business]"></textarea>
          <div class="hint">This message will be sent with your reminder.</div>
        </div>

        <button class="btn btn-send" id="sendReminderBtn">Send Reminder</button>
      </div>

      <div class="info-text">
        Click the gear icon ⚙️ to update settings
      </div>
    </div>

    <!-- Loading State -->
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      <p>Processing...</p>
    </div>
  </div>

  <!-- AI Prompt Modal -->
  <div class="modal-overlay" id="aiPromptModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>🤖 AI Prompt</h3>
        <button class="modal-close" id="aiCancelBtn">✕</button>
      </div>
      <div class="modal-body">
        <textarea id="aiPromptText" placeholder="Example: Give me an email for announcing 10% discount at all jeans collection Gadge Garments"></textarea>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="aiCancelBtn2">Cancel</button>
        <button class="btn-generate" id="aiGenerateBtn">Generate</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
